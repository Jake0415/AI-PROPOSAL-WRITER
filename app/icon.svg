<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 배경: 둥근 사각형 (파란 그라데이션) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 문서 아이콘 (제안서) -->
  <rect x="8" y="5" width="16" height="20" rx="2" fill="white" opacity="0.95"/>

  <!-- 문서 줄 (텍스트 라인) -->
  <rect x="11" y="9" width="10" height="1.5" rx="0.75" fill="#3B82F6" opacity="0.6"/>
  <rect x="11" y="12.5" width="8" height="1.5" rx="0.75" fill="#3B82F6" opacity="0.4"/>
  <rect x="11" y="16" width="10" height="1.5" rx="0.75" fill="#3B82F6" opacity="0.6"/>
  <rect x="11" y="19.5" width="6" height="1.5" rx="0.75" fill="#3B82F6" opacity="0.4"/>

  <!-- AI 스파크 (오른쪽 하단) -->
  <circle cx="24" cy="24" r="6" fill="#FBBF24"/>
  <text x="24" y="26.5" text-anchor="middle" font-size="8" font-weight="bold" font-family="system-ui" fill="#1D4ED8">AI</text>
</svg>
