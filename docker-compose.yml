services:
  nginx:
    image: nginx:alpine
    ports:
      - "3100:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiprowriter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiprowriter}
      POSTGRES_DB: aiprowriter
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiprowriter"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # DB 마이그레이션 + 시드 (deploy 시 자동 실행, 완료 후 종료)
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://aiprowriter:${POSTGRES_PASSWORD:-aiprowriter}@db:5432/aiprowriter
    command: sh scripts/migrate-and-seed.sh
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AIPROWRITER}
        NEXT_PUBLIC_APP_DESCRIPTION: ${NEXT_PUBLIC_APP_DESCRIPTION:-RFP를 업로드하면 AI가 분석하여 완성된 제안서를 자동 생성합니다}
    expose:
      - "3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://aiprowriter:${POSTGRES_PASSWORD:-aiprowriter}@db:5432/aiprowriter
      QDRANT_URL: http://qdrant:6333
    volumes:
      - upload-data:/app/data/uploads
      - output-data:/app/data/outputs
      - template-data:/app/data/templates
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M


  # Qdrant 벡터 DB (RAG 검색용)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pg-data:
  upload-data:
  output-data:
  template-data:
  qdrant-data:
